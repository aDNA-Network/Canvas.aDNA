# A self-referential dog-food input: a deck ABOUT the aDNA Canvas Standard.
# Exercises every slide type (title · content · table · image · quote · section). Generate with:
#   deck-generator build examples/canvas_standard_deck.yaml examples/canvas_standard_deck.canvas
# NOTE: the image slide references an illustrative in-vault asset path (it need not exist — conformance + the
# image->file degradation are what's tested, not asset resolution).
title: "The aDNA Canvas Standard v2.0.0"
id: "urn:adna:canvas:deck:canvas_standard"
version: "0.1.0"
refs:
  - "[[spec_adna_canvas_standard]]"
  - "[[adr_000_canvas_identity]]"
slides:
  - type: title
    title: "The aDNA Canvas Standard"
    subtitle: "A typed grammar for any 2D output — paper, deck, comic, letter, site, post."

  - type: content
    title: "What it is"
    body: "An agentic-context-native fork of Obsidian Advanced Canvas / JSON Canvas — a canvas as a universal output primitive, a context object, and an interface surface."
    bullets:
      - "Positioned, typed components: text, typography, image, video, shape, embed, link."
      - "A canvas is a first-class context object an agent can read, write, and round-trip."
      - "Owned by Canvas.aDNA (Mondrian) as the standard-bearer Platform."

  - type: image
    title: "Reduce to the grammar"
    image: "what/specs/diagrams/canvas_grammar.png"
    caption: "Every 2D output reduces to the smallest set of typed components positioned on a canvas."

  - type: table
    title: "Conformance levels (monotone)"
    table:
      headers: ["Level", "Adds", "Checked by"]
      rows:
        - ["Core", "baseline JSON Canvas nodes + edges", "C-* checks"]
        - ["Extended", "styleAttributes, isStartNode, edge styling", "E-* checks"]
        - ["aDNA-Native", "the _reserved block (component model, panel/link, context object)", "A-* checks"]

  - type: content
    title: "Fork, don't drift"
    body: "A valid aDNA canvas degrades to a valid Obsidian canvas. aDNA-native semantics live additively in the namespaced _reserved block; strip it and a vanilla reader sees a plain JSON-Canvas file."

  - type: quote
    title: "Closing"
    body: "Specify contracts, not engines — the Standard stays lean; producers do the rest."
    attribution: "Mondrian · Canvas.aDNA"
