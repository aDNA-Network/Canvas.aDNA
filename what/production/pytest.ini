[pytest]
# CanvasForge test config — F-10 closure (M-R5-01).
#
# --timeout=30 caps any individual test at 30 seconds. Prevents indefinite hangs
# in mocked-polling tests (root cause of F-10: test_comfyforge_adapter.py
# TestGenerateImageFlow::test_successful_generation polling loop). Root-cause
# repair routes to M-R5-01a.
#
# Markers declared but not yet applied across the suite — M-R5-01a applies
# them at test-migration time alongside the upstream test re-migration.

addopts = --timeout=30

markers =
    network: tests requiring network access (vision API, browser, ComfyUI HTTP)
    slow: tests with intentional long-running behavior (>5s)
    flaky: tests with known intermittent failures (mocked-polling loops, async timing)
